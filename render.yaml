services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: medinsure-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard          # upgrade to pro for production
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medinsure-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: '["https://medinsure.vercel.app"]'
      - key: ENVIRONMENT
        value: production
    disk:
      name: ml-models
      mountPath: /app/app/ml/models
      sizeGB: 1

  # ── PostgreSQL Database ────────────────────────────────────────────────────
databases:
  - name: medinsure-postgres
    databaseName: medinsure_db
    user: medinsure
    plan: free             # upgrade to starter for production
    region: oregon
